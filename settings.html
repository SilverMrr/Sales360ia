<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sales360 - Paramètres</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .cfg-grid { display:grid; gap:16px; }
    .cfg-sub { background:var(--bg-light); border:1px solid var(--border-light); border-radius:var(--radius-md); padding:16px; margin-top:12px; }
    .cfg-row { display:flex; gap:10px; flex-wrap:wrap; align-items:center; margin-top:10px; }
    .status-pill { display:inline-flex; align-items:center; gap:8px; padding:6px 12px; border-radius:20px; font-size:12px; font-weight:700; }
    .status-ok { background:#dcfce7; color:#166534; }
    .status-warn { background:#fef3c7; color:#92400e; }
  </style>
</head>
<body>
  <div class="app-container">
    <aside class="sidebar">
      <div class="logo"><div class="logo-icon">S3</div><span>Sales360</span></div>
      <nav>
        <ul class="nav-menu">
          <li class="nav-item"><a href="index.html" class="nav-link"><span>Accueil</span></a></li>
          <li class="nav-item"><a href="dashboard.html" class="nav-link"><span>Tableau de bord</span></a></li>
          <li class="nav-item"><a href="contacts.html" class="nav-link"><span>Contacts</span></a></li>
          <li class="nav-item"><a href="pipeline.html" class="nav-link"><span>Pipeline</span></a></li>
          <li class="nav-item"><a href="telephony.html" class="nav-link"><span>Téléphonie</span></a></li>
          <li class="nav-item"><a href="visio.html" class="nav-link"><span>Visioconférence</span></a></li>
          <li class="nav-item"><a href="settings.html" class="nav-link active"><span>Paramètres</span></a></li>
        </ul>
      </nav>
    </aside>

    <main class="main-content">
      <header class="topbar"><div class="topbar-left"><h1>Paramètres</h1></div></header>
      <div class="content">
        <div class="card">
          <div class="settings-section">
            <h2 class="settings-title">Configuration IA</h2>
            <div class="settings-item" style="align-items:flex-start;">
              <div class="cfg-grid" style="width:100%;">
                <div>
                  <div class="settings-label">Mode IA actif</div>
                  <div class="settings-description" id="ai-active-summary">—</div>
                  <div id="ai-active-pill" class="status-pill status-warn" style="margin-top:8px;">Configuration incomplète</div>
                </div>

                <div class="form-group" style="margin:0;">
                  <label class="form-label">Choix du mode IA</label>
                  <select id="ai-mode" class="form-input" onchange="onModeChange()">
                    <option value="gemini_all_in_one">Gemini tout-en-un</option>
                    <option value="split_apis">APIs séparées</option>
                  </select>
                </div>

                <div id="gemini-config" class="cfg-sub">
                  <h3 style="margin:0 0 10px 0; font-size:16px;">Gemini tout-en-un</h3>
                  <div class="form-group" style="margin:0 0 10px 0;">
                    <label class="form-label">Clé API Gemini</label>
                    <input type="password" id="gemini-key" class="form-input" placeholder="AIza...">
                  </div>
                  <div class="cfg-row">
                    <button class="btn btn-secondary" type="button" onclick="testGeminiConfig()">Tester la clé Gemini</button>
                  </div>
                </div>

                <div id="split-config" class="cfg-sub" style="display:none;">
                  <h3 style="margin:0 0 10px 0; font-size:16px;">APIs séparées</h3>

                  <div class="cfg-sub" style="margin-top:8px;">
                    <div class="settings-label">Transcription audio</div>
                    <div class="cfg-row">
                      <select id="audio-provider" class="form-input" style="max-width:260px;">
                        <option value="openai">OpenAI Transcribe</option>
                        <option value="deepgram">Deepgram</option>
                      </select>
                      <input type="password" id="audio-api-key" class="form-input" placeholder="Clé API audio" style="min-width:280px;">
                      <button class="btn btn-secondary" type="button" onclick="testAudioConfig()">Tester</button>
                    </div>
                  </div>

                  <div class="cfg-sub" style="margin-top:8px;">
                    <div class="settings-label">Analyse CRM texte</div>
                    <div class="cfg-row">
                      <select id="text-provider" class="form-input" style="max-width:220px;">
                        <option value="openai">OpenAI</option>
                      </select>
                      <input type="password" id="text-api-key" class="form-input" placeholder="Clé API texte" style="min-width:280px;">
                      <input type="text" id="text-model" class="form-input" value="gpt-4o-mini" style="max-width:200px;" placeholder="Modèle texte">
                      <button class="btn btn-secondary" type="button" onclick="testTextConfig()">Tester</button>
                    </div>
                  </div>
                </div>

                <div class="cfg-row">
                  <button class="btn btn-primary" type="button" onclick="saveAiSettings()">💾 Sauvegarder la configuration IA</button>
                </div>
                <div id="ai-missing" class="settings-description" style="color:#b45309;"></div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="ai-engine.js"></script>
  <script src="main.js"></script>
  <script>
    function notify(msg, type='ok') {
      alert(msg);
    }

    function refreshAiUi() {
      if (!window.S360AI) return;
      const cfg = S360AI.getAiConfig();
      document.getElementById('ai-mode').value = cfg.mode;
      document.getElementById('gemini-key').value = cfg.geminiKey || '';
      document.getElementById('audio-provider').value = cfg.audioProvider || 'openai';
      document.getElementById('audio-api-key').value = cfg.audioApiKey || '';
      document.getElementById('text-provider').value = cfg.textProvider || 'openai';
      document.getElementById('text-api-key').value = cfg.textApiKey || '';
      document.getElementById('text-model').value = cfg.textModel || 'gpt-4o-mini';

      const summary = S360AI.getActiveAiSummary();
      document.getElementById('ai-active-summary').textContent = summary;
      const missing = S360AI.getMissingRequirements();
      document.getElementById('ai-missing').textContent = missing.length ? `Manquant: ${missing.join(' · ')}` : 'Configuration complète ✅';

      const pill = document.getElementById('ai-active-pill');
      pill.className = `status-pill ${missing.length ? 'status-warn' : 'status-ok'}`;
      pill.textContent = missing.length ? 'Configuration incomplète' : 'Prêt';

      const isGemini = cfg.mode === 'gemini_all_in_one';
      document.getElementById('gemini-config').style.display = isGemini ? 'block' : 'none';
      document.getElementById('split-config').style.display = isGemini ? 'none' : 'block';
    }

    function onModeChange() {
      const mode = document.getElementById('ai-mode').value;
      S360AI.setAiMode(mode);
      refreshAiUi();
    }

    function saveAiSettings() {
      S360AI.saveAiConfig({
        mode: document.getElementById('ai-mode').value,
        geminiKey: document.getElementById('gemini-key').value.trim(),
        audioProvider: document.getElementById('audio-provider').value,
        audioApiKey: document.getElementById('audio-api-key').value.trim(),
        textProvider: document.getElementById('text-provider').value,
        textApiKey: document.getElementById('text-api-key').value.trim(),
        textModel: document.getElementById('text-model').value.trim() || 'gpt-4o-mini'
      });
      refreshAiUi();
      notify('Configuration IA sauvegardée ✅');
    }

    async function testGeminiConfig() {
      try {
        const key = document.getElementById('gemini-key').value.trim();
        await S360AI.testGeminiKey(key);
        notify('Clé Gemini valide ✅');
      } catch (e) { notify('Test Gemini échoué: ' + e.message); }
    }

    async function testAudioConfig() {
      try {
        const provider = document.getElementById('audio-provider').value;
        const key = document.getElementById('audio-api-key').value.trim();
        await S360AI.testAudioProviderKey(provider, key);
        notify('Clé transcription valide ✅');
      } catch (e) { notify('Test audio échoué: ' + e.message); }
    }

    async function testTextConfig() {
      try {
        const provider = document.getElementById('text-provider').value;
        const key = document.getElementById('text-api-key').value.trim();
        await S360AI.testTextProviderKey(provider, key);
        notify('Clé texte valide ✅');
      } catch (e) { notify('Test texte échoué: ' + e.message); }
    }

    window.onModeChange = onModeChange;
    window.saveAiSettings = saveAiSettings;
    window.testGeminiConfig = testGeminiConfig;
    window.testAudioConfig = testAudioConfig;
    window.testTextConfig = testTextConfig;

    refreshAiUi();
  </script>
</body>
</html>
